<?xml version="1.0" encoding="UTF-8"?>
<!--
  Setnayan APP ICON — owner-supplied 2026-05-31 ("this will be the app icon").
  The same champagne-gold (#cb9e4b) S/Y monogram as /brand/setnayan-mark.svg,
  but on a FULL-BLEED white tile with ~14% breathing room so it survives the
  maskable safe zone (Android adaptive squircle) and iOS apple-touch rounding.

  Why a separate asset: the transparent glyph (setnayan-mark.svg / icon-*.svg)
  is the website logo + browser-tab favicon — it sits on the page/tab bg. An
  INSTALLED app / home-screen icon needs an opaque tile (iOS composites
  transparency onto black; Android crops to a squircle), so this filled,
  padded version is the canonical app-icon source. A 512px PNG is rendered
  from this file for the manifest maskable + apple-touch entries.

  Geometry is the owner's exported monogram verbatim (path + matrix + clip);
  margin is added purely via the padded viewBox + an oversized backing rect,
  so the artwork coordinates are never re-mathed.
-->
