packages:
  - "apps/*"
  # apps/mobile is the Capacitor native shell — a self-contained npm project
  # (Capacitor expects a flat node_modules; pnpm's symlinked store breaks
  # `cap sync` plugin resolution). Excluded so the root pnpm frozen-lockfile
  # install ignores it and the web app's dependency tree stays untouched.
  - "!apps/mobile"
  - "packages/*"
