name: auto-enable-automerge

# AUTO-UPLOAD guardrail (owner 2026-06-14): every non-draft PR has auto-merge
# armed automatically, so shipping to prod never depends on a session (Claude
# or human) remembering to run `gh pr merge --auto`. The actual merge is still
# gated by branch protection — auto-merge only fires once ALL required checks
# pass (typecheck+lint · production build · secret scan · migration timestamp
# guard · playwright e2e · bundle size · lighthouse). Broken code can never
# auto-merge; this only removes the "forgot to arm it" failure mode that let
# PRs pile up unmerged.
#
# To HOLD a PR (don't let it auto-merge): open it as a DRAFT — this workflow
# skips drafts. Marking it "Ready for review" arms auto-merge. To pause an
# already-armed PR: `gh pr merge <#> --disable-auto`.
#
# RETIRE THIS at public-vendor launch: when updates move to a temp/staging
# site (see corpus deployment-phases), delete this workflow so prod stops
# auto-accepting every green PR.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Arm auto-merge (merge commit)
        env:
          # ⚠ Bot-merge workflow suppression (observed 2026-07-15, PRs #3243/#3245):
          # when auto-merge is ARMED with github.token, GitHub attributes the
          # eventual merge to app/github-actions and SUPPRESSES all main-branch
          # workflow triggers — supabase-migrations, ci, e2e, deploy-prod all
          # silently skip (Vercel's native git webhook still deploys; only
          # Actions are suppressed). PR #3242, armed by the owner's own gh CLI
          # (user PAT), triggered everything normally.
          # FIX: arm with AUTOMERGE_PAT (a classic PAT or GitHub-App token with
          # repo scope, created by the owner → repo secrets). Falls back to
          # github.token so this workflow never hard-fails while the secret is
          # unset — but until it IS set, merges it arms fire no main workflows
          # and migrations must be dispatched manually:
          #   gh workflow run supabase-migrations.yml --ref main
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT || github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto --merge \
          || echo "Could not arm auto-merge (already merged, or not yet mergeable) — branch protection still gates the merge."
