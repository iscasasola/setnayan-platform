<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Setnayan</title>
    <style>
      :root {
        --alabaster: #fbfbfa;
        --obsidian: #1e2229;
        --gold: #c5a059;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%;
        background: var(--alabaster); color: var(--obsidian);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        height: 100%; display: flex; flex-direction: column;
        align-items: center; justify-content: center; text-align: center;
        padding: 24px; gap: 18px;
      }
      .mark { font-size: 26px; letter-spacing: 0.32em; font-weight: 600; }
      .mark span { color: var(--gold); }
      h1 { font-size: 19px; font-weight: 600; margin: 4px 0 0; }
      p { margin: 0; max-width: 30ch; line-height: 1.5; opacity: 0.7; font-size: 14px; }
      button {
        margin-top: 6px; padding: 12px 26px; border: 0; border-radius: 999px;
        background: var(--obsidian); color: var(--alabaster);
        font-size: 15px; font-weight: 600; letter-spacing: 0.01em;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <!--
      LOCAL FALLBACK only. The native shell normally loads the live hosted app
      (server.url in capacitor.config.ts). This page renders when the device is
      offline or the remote URL is unreachable. Wiring it as the WebView error
      page is a per-platform follow-up (iOS: WKNavigationDelegate; Android:
      WebViewClient.onReceivedError) — see README "Offline fallback".
    -->
    <div class="wrap">
      <div class="mark">SET<span>·</span>NAYAN</div>
      <h1>You're offline</h1>
      <p>We couldn't reach Setnayan. Check your connection and try again — <em>set na 'yan.</em></p>
      <!-- Retry navigates back to the hosted app, not a reload of this local
           fallback page. Keep in sync with server.url in capacitor.config.ts. -->
      <button onclick="location.href='https://www.setnayan.com'">Retry</button>
    </div>
  </body>
</html>
