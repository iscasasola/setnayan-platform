<?xml version="1.0" encoding="UTF-8"?>
<!--
  Temporary Setnayan brand icon (locked 2026-05-23 PM).
  Orange-to-red diagonal gradient with white "SET" stacked above white "NA 'YAN".
  Owner directive: "make this the temporary icon for setnayan. both on website and icons".
  Single canonical SVG shared by:
    - /icon-192.svg + /icon-512.svg (PWA manifest + Next.js layout favicons)
    - /brand/setnayan-mark.svg + /brand/setnayan-logo.svg (Logo component + share images)
  The viewBox stays 1024-square so consumers can scale to any size without re-rasterizing.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Setnayan">
  <defs>
    <linearGradient id="setnayan-temp-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A1F"/>
      <stop offset="1" stop-color="#FF2A1B"/>
    </linearGradient>
  </defs>
  <title>Setnayan</title>
  <rect width="1024" height="1024" fill="url(#setnayan-temp-gradient)"/>
  <g fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="512" y="540" font-size="340" letter-spacing="-8">SET</text>
    <text x="512" y="760" font-size="180" letter-spacing="0">NA &#8216;YAN</text>
  </g>
</svg>
