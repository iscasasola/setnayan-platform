name: lighthouse

# Runs Lighthouse CI against a local production build under throttled mobile
# 4G PH conditions (CLAUDE.md 2026-05-22 KPI lock: LCP <1.5s · INP <100ms ·
# CLS <0.05). Three pages covered today: /, /pricing, /login.
#
# Category gates (Performance / A11y / Best Practices / SEO ≥ 90) stay as
# `error` (hard fail) — those are stable.
#
# Core Web Vitals (LCP / TBT / max-potential-FID / CLS / FCP / speed-index)
# ship as `warn` (Task #33) — we report them on every PR and use the next
# 1-2 weeks of runs to establish baselines. Flip to `error` post-pilot once
# we know which page actually anchors the budget (Slug pages may need
# different thresholds than marketing-static surfaces).

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build web
        run: pnpm --filter @setnayan/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14 autorun
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
