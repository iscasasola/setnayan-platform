<?xml version="1.0" encoding="UTF-8"?>
<!--
  Temporary Setnayan brand icon (locked 2026-05-23 PM).
  192-size variant for the PWA manifest small-icon slot. Same source SVG
  as /icon-512.svg — kept as a separate file so the manifest entries can
  declare distinct `sizes` attributes per the Web App Manifest spec.
  Owner directive: "make this the temporary icon for setnayan. both on
  website and icons".
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Setnayan">
  <defs>
    <linearGradient id="setnayan-temp-gradient-192" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A1F"/>
      <stop offset="1" stop-color="#FF2A1B"/>
    </linearGradient>
  </defs>
  <title>Setnayan</title>
  <rect width="1024" height="1024" fill="url(#setnayan-temp-gradient-192)"/>
  <g fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-weight="900" text-anchor="middle">
    <text x="512" y="540" font-size="340" letter-spacing="-8">SET</text>
    <text x="512" y="760" font-size="180" letter-spacing="0">NA &#8216;YAN</text>
  </g>
</svg>
