name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck-lint:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm --filter @setnayan/web test:unit

  build:
    name: production build
    runs-on: ubuntu-latest
    # Catches errors that typecheck misses — most notably Next's
    # compile-time `server-only` guard, which only fires in `next build`.
    # Vercel runs the same build, so if this passes locally + here, deploy
    # will pass too.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build web app
        run: pnpm --filter @setnayan/web build
        env:
          # Provide dummy values for env vars next.config / next build read at
          # build time. Real values are set on Vercel; CI only needs the build
          # to succeed, not to actually call Supabase/etc.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  bundle-size-check:
    name: bundle size check
    runs-on: ubuntu-latest
    # Hard ceiling: 200KB gzipped on the shared client bundle (union of
    # chunks loaded on every page). CLAUDE.md 2026-05-22 KPI lock —
    # without this guard, a single chunky import in a shared layout
    # silently regresses LCP for every couple-facing route. The script
    # at apps/web/scripts/check-bundle-size.mjs intersects build-manifest
    # routes, gzips each shared chunk on disk, and fails over budget.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build web app
        run: pnpm --filter @setnayan/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Check shared bundle size
        run: pnpm --filter @setnayan/web bundle-size-check

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-retired-strings:
    name: lint retired strings
    runs-on: ubuntu-latest
    # Fails when retired product strings re-appear in apps/web/app/**.
    # 2026-05-22 10-sweep audit Sweep 5 found 5 new drifts in 4 days, including
    # Pareto + Custom Monogram Pack listed on /features 8 days after their
    # retirement. This guard stops drift treadmill at PR-merge time.
    # Config: apps/web/.retired-strings.json — add entries here, no code change.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint retired strings
        run: node apps/web/scripts/lint-retired-strings.mjs

  lint-bottom-nav:
    name: lint bottom-nav template
    runs-on: ubuntu-latest
    # Enforces the UNBREAKABLE bottom-nav template (owner-locked 2026-06-13 ·
    # project_setnayan_bottom_nav_canonical). Fails if a doorway adds a
    # *-bottom-nav.tsx wrapper that doesn't delegate to the canonical
    # <BottomNav>, OR if the canonical primitive loses its locked-interaction
    # markers (the central --bn-* tuning props + the travel-stretch hook).
    # See apps/web/scripts/lint-bottom-nav.mjs.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint bottom-nav template
        run: node apps/web/scripts/lint-bottom-nav.mjs

  lint-nav-icon-source:
    name: lint nav icon source
    runs-on: ubuntu-latest
    # Locks the nav/icon/menu-registry single-source invariant (Phase 9 ·
    # project_setnayan_nav_icon_menu_registry). Fails if a nav-chrome chokepoint
    # (customer/vendor/admin sidebar + bottom-nav, public marketing site-nav)
    # stops sourcing its menu labels/icons from the registry, OR if the registry
    # plumbing (resolver/defaults/icon converter) loses a required export.
    # Positive delegation guard — NOT a lucide ban. See
    # apps/web/scripts/lint-nav-icon-source.mjs.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint nav icon source
        run: node apps/web/scripts/lint-nav-icon-source.mjs

  lint-email-links:
    name: lint email template links
    runs-on: ubuntu-latest
    # Task #20 of the 2026-05-22 audit verified that every emitNotification
    # `relatedUrl` resolves to a real route under apps/web/app/**. This guard
    # keeps it that way — a broken `relatedUrl` ships a 404 link to the user's
    # inbox via Resend, and the owner won't see it until pilot. See
    # apps/web/scripts/lint-email-links.mjs for the matcher logic.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint email template links
        run: node apps/web/scripts/lint-email-links.mjs

  lint-entitlement-gates:
    name: lint entitlement gates
    runs-on: ubuntu-latest
    # Two guards on the couple-SKU ownership layer (added after the PR4/PR4b
    # "bundle buyer wrongly denied a paid SKU" bugs):
    #   1. couple-SKU gates must use the bundle-aware eventOwnsSku(), never the
    #      bare checkOrderOwnership() (blind to GUIDED_PACK/MEDIA_PACK ownership)
    #      — unless the SKU is in no bundle (explicit `bare-ok` annotation);
    #   2. the three bundle-membership mirrors (BUNDLE_MEMBERS · BUNDLE_CHILD_SKUS
    #      · bundles_granting_sku() SQL) must agree exactly.
    # Pure node, no install. See apps/web/scripts/lint-entitlement-gates.mjs.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint entitlement gates
        run: node apps/web/scripts/lint-entitlement-gates.mjs

  lint-papic-keep-permanent:
    name: lint papic keep-permanent
    runs-on: ubuntu-latest
    # Failproofs the free-Papic-sampler "connect Drive OR upgrade = kept forever"
    # promise. The promise lives in several best-effort sites (the 3 convert
    # hooks, the capture-time stamp, and the retention sweep's self-heal
    # backstop); if a refactor silently drops one, couples who CONVERT lose their
    # photos at day 30 with no error. This guard fails the moment any link is
    # un-wired. See apps/web/scripts/lint-papic-keep-permanent.mjs.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint papic keep-permanent
        run: node apps/web/scripts/lint-papic-keep-permanent.mjs

  migration-timestamp-guard:
    name: migration timestamp guard
    runs-on: ubuntu-latest
    # Fails when two files under supabase/migrations/ share the same 14-digit
    # timestamp prefix. `supabase db push` uses each prefix as the primary key
    # in `supabase_migrations.schema_migrations`, so a duplicate crashes the
    # push *after* one migration's DDL has already executed — prod ends up
    # half-applied and recovery is manual. Caught twice in two days (PRs #77
    # and #81); this guard prevents a third.
    steps:
      - uses: actions/checkout@v4

      - name: Check for duplicate migration timestamps
        run: |
          set -euo pipefail

          summary="${GITHUB_STEP_SUMMARY:-/dev/null}"

          if [ ! -d supabase/migrations ]; then
            echo "✅ No supabase/migrations directory — nothing to check." | tee -a "$summary"
            exit 0
          fi

          # Migration filenames are strictly <14-digit-timestamp>_<slug>.sql,
          # no whitespace, so `ls` is fine here and portable to dev macOS too.
          # Anything else under the dir (.gitkeep, README, etc.) is ignored.
          # `|| true` guards against grep exiting 1 on an empty/non-matching
          # directory (pipefail would otherwise abort the script here).
          prefixes=$(ls supabase/migrations/ 2>/dev/null \
            | grep -oE '^[0-9]{14}_' \
            | sed 's/_$//' \
            | sort \
            || true)

          duplicates=$(echo "$prefixes" | uniq -d || true)

          if [ -z "$duplicates" ]; then
            count=$(echo "$prefixes" | grep -c '^[0-9]' || true)
            echo "✅ All ${count} migrations have unique 14-digit timestamp prefixes."
            echo "✅ All ${count} migrations have unique 14-digit timestamp prefixes." >> "$summary"
            exit 0
          fi

          {
            echo "## ❌ Duplicate migration timestamps"
            echo ""
            echo "Two or more files under \`supabase/migrations/\` share the same 14-digit timestamp prefix. \`supabase db push\` uses that prefix as the primary key in \`supabase_migrations.schema_migrations\` — the second migration crashes on a unique-constraint violation after its DDL has already executed, leaving prod half-applied."
            echo ""
            echo "**Colliding files:**"
            echo ""
          } >> "$summary"

          echo "::error::Duplicate migration timestamps detected — supabase db push would crash on the duplicate."
          for ts in $duplicates; do
            echo ""
            echo "Timestamp $ts is used by:"
            ls supabase/migrations/ | grep -E "^${ts}_.*\.sql$" | sed 's/^/  /'
            echo "- \`$ts\`" >> "$summary"
            ls supabase/migrations/ | grep -E "^${ts}_.*\.sql$" | sed 's/^/    - `/; s/$/`/' >> "$summary"
          done

          {
            echo ""
            echo "**Fix:** rename one of the colliding files so the 14-digit prefix is unique. A 1-minute offset (\`+1000\` on the last 4 digits) is enough — e.g. \`20260515000000\` → \`20260515001000\`. Pick whichever file is logically \"later\" so the migration order stays sensible. The migration DDL itself doesn't need to change."
          } >> "$summary"

          exit 1
