name: supabase-migrations

# Auto-applies new Supabase migrations to production on every push to main
# that touches `supabase/migrations/**`. Closes the gap where Vercel deploys
# the app code with `next build` but never runs `supabase db push` — which
# left several recent migrations (e.g. event_vendors.source_venue_directory_id)
# unmerged in prod and surfaced as "Try again" errors on the marketplace.
#
# ─── ONE-TIME SETUP (owner) ──────────────────────────────────────────
# This workflow needs three pieces of state attached to the repo on
# GitHub. Set them once, then every merge to main with a new migration
# applies itself.
#
#   1. Settings → Secrets and variables → Actions → New repository secret
#         Name:  SUPABASE_ACCESS_TOKEN
#         Value: <personal access token from
#                 https://supabase.com/dashboard/account/tokens>
#
#   2. Same place, second secret:
#         Name:  SUPABASE_DB_PASSWORD
#         Value: <the database password — Supabase dashboard → Project
#                 Settings → Database → Connection string contains it,
#                 OR reset it under Database → Reset database password>
#
#   3. Settings → Secrets and variables → Actions → New repository VARIABLE
#         Name:  SUPABASE_PROJECT_REF
#         Value: njrupjnvkjkitfctetvi
#                (the project ref from NEXT_PUBLIC_SUPABASE_URL — kept as
#                 a variable, not a secret, since it's already in the
#                 client bundle. Variable lets future env-split land
#                 cleanly without rewriting the workflow.)
#
# After all three are set, the next migration commit to main triggers
# this workflow automatically. The Actions tab shows what got applied.
#
# ─── HOW TO RUN MANUALLY ─────────────────────────────────────────────
# Actions → supabase-migrations → Run workflow → main. Useful when:
#   • A previous run failed mid-apply and you want to retry
#   • A migration landed in main without touching `supabase/migrations/**`
#     (rare — the path filter exists to skip the workflow for unrelated
#     PRs, not to gate intentional applies)
#
# ─── HOW IT WORKS ────────────────────────────────────────────────────
# The Supabase CLI's `db push` reads `supabase_migrations.schema_migrations`
# in the target database and applies only versions that aren't already
# present. Re-running is a no-op. Migration ordering follows the
# alphabetical filename order under `supabase/migrations/`, so timestamp
# prefixes ARE the version identifier — duplicate timestamps cause CLI
# errors (caught here at apply time, not at runtime).

# STATE (2026-06-17): the push trigger is ARMED but the workflow is DORMANT —
# the `gate` step green no-ops on every migration merge until the 3 secrets are
# set, so arming it costs nothing today. This supersedes the 2026-05-24
# commented-out disable (its concern — "don't auto-apply a bad migration during
# the pilot" — is preserved: nothing applies until the owner sets the secrets).
#
# WHY enable it (eventually): applying migrations to prod manually, AHEAD of the
# PR merge, is the root cause of this repo's worst migration incidents — the
# `db push` jam, the silent QR-RPC drop, and the dup-collision ledger surgery
# (all 2026-06-17). Auto-apply-on-merge means migrations apply ONLY post-merge,
# under finalized timestamps, with applied==recorded — the whole class disappears.
#
# FLIP ON = just set the 3 (header) and the next migration merge self-applies.
# Until then: manual `supabase db push --db-url "$SUPABASE_DB_URL"` post-merge,
# or Actions → supabase-migrations → Run workflow (also no-ops without secrets).
on:
  # ARMED 2026-06-17 but DORMANT until the 3 secrets are set (the `gate` step
  # below green no-ops while they're unset, so this never spams red on a normal
  # migration merge). Setting the secrets is the single "flip on" action —
  # supersedes the 2026-05-24 commented-out disable.
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

# Serialize applies across overlapping main pushes. `cancel-in-progress`
# left FALSE because a half-applied migration set is a worse state than
# a queued-up second run.
concurrency:
  group: supabase-migrations-prod
  cancel-in-progress: false

jobs:
  apply:
    name: apply pending migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      # Dormant-until-configured gate. With the push trigger ARMED, this runs on
      # every migration merge to main — but it must NOT spam a red failure while
      # the 3 secrets are unset (the pre-launch default). So it GREEN no-ops
      # until all three are present; the owner "flips it on" purely by setting
      # the secrets (see the header). Then every migration merge self-applies —
      # which removes the apply-ahead-of-merge anti-pattern that caused the
      # `db push` jam + the silent QR-RPC drop + the dup-collision ledger surgery.
      - name: Gate — is auto-apply configured?
        id: gate
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "✅ All 3 secrets present — auto-apply ARMED; applying pending migrations."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Auto-apply dormant::Scaffolded but OFF — set SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD (secrets) and the SUPABASE_PROJECT_REF variable to enable (header has the steps). No migrations were applied."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        if: steps.gate.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        if: steps.gate.outputs.enabled == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: List local migrations
        if: steps.gate.outputs.enabled == 'true'
        run: |
          echo "Local migration files in this commit:"
          ls -1 supabase/migrations/ | grep -E '^[0-9]+_' || echo "(none)"

      - name: Apply pending migrations
        if: steps.gate.outputs.enabled == 'true'
        run: supabase db push --yes

      - name: Show migration history after apply
        if: always() && steps.gate.outputs.enabled == 'true'
        run: supabase migration list
