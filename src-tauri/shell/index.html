<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="refresh" content="0; url=https://setnayan.com" />
    <title>Setnayan</title>
    <style>
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #faf7f2;
        color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .mark {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        background: #c97b4b;
        display: grid;
        place-items: center;
        color: #faf7f2;
        font-size: 56px;
        font-weight: 700;
      }
      p {
        font-size: 14px;
        color: #1a1a1a99;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      a {
        color: #c97b4b;
      }
    </style>
  </head>
  <body>
    <div class="mark">S</div>
    <p>Loading Setnayan…</p>
    <noscript><a href="https://setnayan.com">Open Setnayan</a></noscript>
    <script>
      window.location.replace('https://setnayan.com');
    </script>
  </body>
</html>
