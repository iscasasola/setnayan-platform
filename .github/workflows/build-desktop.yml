name: build-desktop

# Produces buildable .app (macOS) + .exe / .msi (Windows) artifacts on every
# push to main and on PRs touching the desktop wrapper, and publishes the
# freshest installers to a rolling `desktop-latest` release.
#
# macOS signing: if the APPLE_* repo secrets are present, `tauri build`
# Developer-ID-signs + notarizes the bundle (no Gatekeeper warning on
# download); if they're absent it falls back to ad-hoc signing (the old
# Sprint-0 behavior, so CI never breaks). Windows is still unsigned (Phase 2).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'apps/web/**'
      - 'src-tauri/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
            artifact-glob: 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - platform: windows-latest
            target: 'x86_64-pc-windows-msvc'
            artifact-glob: 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi'

    runs-on: ${{ matrix.platform }}

    # Apple Developer ID signing + notarization (macOS). When these repo secrets
    # are set, `tauri build` signs the .app/.dmg with Developer ID + hardened
    # runtime and notarizes via Apple's notarytool, then staples the ticket —
    # so a downloaded .dmg opens with no Gatekeeper warning. When they're empty
    # (forks, or before secrets are added) the macOS leg falls back to the
    # ad-hoc signing step below, unchanged. Windows ignores them.
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Tauri CLI
        run: pnpm add -g @tauri-apps/cli@^2

      - name: Generate Tauri icons (from icon.svg)
        run: tauri icon src-tauri/icons/icon.svg

      - name: Build desktop bundle
        run: tauri build --target ${{ matrix.target }}
        env:
          # Sprint 0: build is unsigned so the Tauri build doesn't try to load
          # signing identities that don't exist yet.
          TAURI_SIGNING_PRIVATE_KEY: ''
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://placeholder' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://setnayan.com' }}

      - name: Ad-hoc codesign macOS bundle (fallback — only when no Developer ID cert)
        # Skipped once APPLE_SIGNING_IDENTITY is set: `tauri build` has already
        # Developer-ID-signed + notarized the bundle, and re-running an ad-hoc
        # codesign would strip that real signature.
        if: matrix.platform == 'macos-latest' && env.APPLE_SIGNING_IDENTITY == ''
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Setnayan.app"
          DMG_PATH=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          codesign --force --deep --sign - "$APP_PATH"
          xattr -cr "$APP_PATH"
          xattr -cr "$DMG_PATH"
          echo "Ad-hoc signed (unsigned distribution): $APP_PATH"

      - name: Verify Developer ID signature + notarization (macOS, when signed)
        # Informational: logs the signing authority, Gatekeeper verdict, and
        # whether the notarization ticket is stapled. Non-fatal for now so a
        # transient check can't block the publish; can be hardened to fail-on-
        # reject once a clean run is confirmed.
        if: matrix.platform == 'macos-latest' && env.APPLE_SIGNING_IDENTITY != ''
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Setnayan.app"
          DMG_PATH=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          echo "== codesign authority =="
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Authority|TeamIdentifier|Identifier|flags|Runtime" || true
          echo "== Gatekeeper assessment (.app) =="
          spctl -a -vvv -t exec "$APP_PATH" || true
          echo "== notarization staple (.dmg) =="
          xcrun stapler validate "$DMG_PATH" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: setnayan-desktop-${{ matrix.platform }}
          path: ${{ matrix.artifact-glob }}
          # error (not warn): a desktop build that produces no installer is a
          # real failure — surface it instead of silently shipping nothing.
          if-no-files-found: error
          retention-days: 14

  # Publish the freshest macOS .dmg + Windows .msi to a rolling pre-release
  # ("desktop-latest") on every push to main, so the public download is never
  # stale. The Actions artifacts above expire in 14 days and need a GitHub
  # login to fetch; this gives a stable, always-current download URL:
  #   https://github.com/iscasasola/setnayan-platform/releases/download/desktop-latest/Setnayan_0.0.1_aarch64.dmg
  # The semantic v0.0.1 release is left untouched.
  publish-latest:
    name: publish desktop-latest
    needs: build
    # Run on main pushes only, and even if one matrix leg flaked — Windows is a
    # non-required check, so a Windows hiccup must not freeze the Mac download.
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # macOS and Windows artifacts land in their own subdirectories.
          pattern: setnayan-desktop-*
          merge-multiple: true

      - name: List downloaded installers
        run: ls -laR dist

      - name: Publish to rolling desktop-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Setnayan Desktop — latest main build
          # Pre-release so it doesn't steal the "Latest" badge from a future
          # semantic release; this is the rolling edge build off main.
          prerelease: true
          files: dist/**/*
          fail_on_unmatched_files: true
          body: |
            **Rolling desktop build — always tracks the latest `main`.**

            Commit `${{ github.sha }}` · built ${{ github.run_id }}

            Downloads:
            - **macOS (Apple Silicon):** `Setnayan_*_aarch64.dmg`
            - **Windows (x64):** `Setnayan_*_x64_en-US.msi`

            macOS builds are Developer-ID-signed + notarized when the signing
            secrets are configured (open normally). If you hit a Gatekeeper
            warning on an unsigned fallback build, right-click the app →
            **Open**, or run `xattr -cr /Applications/Setnayan.app`. Apple
            Silicon only for now (no Intel build yet).
