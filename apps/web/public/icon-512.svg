<?xml version="1.0" encoding="UTF-8"?>
<!--
  Setnayan brand mark — official gold mark (owner-supplied 2026-05-31).
  Replaces the temporary 2026-05-23 orange→red "SET NA 'YAN" gradient tile.
  Flat champagne-gold (#cb9e4b) glyph on a transparent ground; scales crisply
  at any size from 16px favicons to 512px PWA icons.

  Single canonical shape — byte-identical copies live at:
    /brand/setnayan-mark.svg + /brand/setnayan-logo.svg  (Logo / share images)
    /icon-192.svg + /icon-512.svg                         (PWA manifest + favicons)
  Consumed by <Logo> (logo.tsx) and <LogoMark> (brand-marks.tsx) via <img src>,
  so the clipPath id never collides across documents.

  Geometry is the owner's exported artwork verbatim (path + matrix + clip);
  only the Inkscape/sodipodi/PDF/Display-P3 metadata was stripped.
-->
